# ==================== 本地开发配置 ====================
spring:
  datasource:
    url: jdbc:h2:file:./data/bible;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true
      schema-locations: classpath:db/h2/schema.sql
      data-locations: classpath:db/h2/data.sql

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  data:
    redis:
      host: localhost

logging:
  level:
    com.bible: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG

mybatis:
  type-handlers-package: com.bible.config