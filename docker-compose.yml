version: '3.8'

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:16-alpine
    container_name: bible-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bible
      POSTGRES_USER: bible_user
      POSTGRES_PASSWORD: bible_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bible_user -d bible"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: bible-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Spring Boot 后端 ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bible-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/bible
      DB_USER: ${DB_USER:-bible_user}
      DB_PASS: ${DB_PASS:-bible_pass}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASS: ${REDIS_PASS:-}
      # 邮件服务配置（联系牧者、验证码均依赖此配置）
      # QQ 邮箱示例：MAIL_HOST=smtp.qq.com, MAIL_PORT=587, MAIL_USER=852341467@qq.com, MAIL_PASS=QQ邮箱授权码
      # 请将以下变量配置到同目录 .env 文件中，或导出为环境变量
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-852341467@qq.com}
      MAIL_PASS: ${MAIL_PASS:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-7200}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-604800}
      SERVER_PORT: "8080"
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== Next.js 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bible-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: